<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060a" />
    <meta name="description" content="NEON HAUL: TRUCK SIMULATOR — haul neon cargo across treacherous routes. Don't spill the load." />

    <!-- Preconnect for the webfont so it never blocks first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>NEON HAUL: TRUCK SIMULATOR</title>
  </head>
  <body class="h-full bg-ink-900 text-white overflow-hidden select-none touch-none antialiased">
    <!-- The 3D render surface. Three.js renders here; everything else is a UI overlay. -->
    <canvas id="game-canvas" class="fixed inset-0 z-0 block h-full w-full"></canvas>

    <!-- UI overlay root. Tailwind-driven glassmorphism HUD/menus mount here above the canvas. -->
    <div id="ui-root" class="pointer-events-none fixed inset-0 z-10"></div>

    <!-- Boot splash (removed by main.js once the first frame is ready). -->
    <div
      id="boot-splash"
      class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-ink-900"
    >
      <h1 class="text-3xl font-black tracking-[0.3em] text-neon-cyan animate-pulse-glow">
        NEON&nbsp;HAUL
      </h1>
      <p class="mt-3 text-xs uppercase tracking-[0.4em] text-white/40">Truck Simulator</p>
      <div class="mt-8 h-1 w-48 overflow-hidden rounded-full bg-white/10">
        <div id="boot-bar" class="h-full w-0 bg-neon-cyan transition-[width] duration-200"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
